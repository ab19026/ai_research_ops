        }
        function renderTable(current) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            for ( let r = 0; r < data[current - 1].length; r++ ) {
                const tr = document.createElement('tr');
                for (let c = 0; c < data[current - 1][0].length; c++) {
                    const td = document.createElement('td');
                    td.innerHTML = data[current - 1][r][c];
                    if ( c == 2 ) {
                        td.innerHTML += "<br><div class='canvas_out'><canvas id='canvas_" + (current-1) + "_" + r + "'></canvas></div>";
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
                const labels = renderOrigin[current-1][r].map((_, i) => i + 1);
                const ctx = document.getElementById('canvas_' + (current-1) + '_' + r).getContext('2d');
                new Chart(ctx, {
                  type: 'line',
                  data: {
                    labels: labels,
                    datasets: [{
                      label: 'Origin',
                      data: renderOrigin[current-1][r],
                      fill: false,
                      borderColor: 'blue',
                      backgroundColor: 'blue',
                      pointRadius: 5,
                      pointBackgroundColor: 'red'
                    },{
                      label: 'PredLeft',
                      data: renderPredLeft[current-1][r],
                      fill: false,
                      borderColor: 'red',
                      backgroundColor: 'red',
                      pointRadius: 5,
                      pointBackgroundColor: 'red'
                    },
                    {
                      label: 'PredRight',
                      data: renderPredRight[current-1][r],
                      fill: false,
                      borderColor: 'green',
                      backgroundColor: 'green',
                      pointRadius: 5,
                      pointBackgroundColor: 'red'
                    }]
                  },
                  options: {
                    scales: {
                      x: {
                        title: { display: true, text: 'Index' }
                      },
                      y: {
                        min: Math.min(...renderOrigin[current-1][r], ...predCand[current-1][r]),
                        max: Math.max(...renderOrigin[current-1][r], ...predCand[current-1][r]),
                        title: { display: true, text: 'Value' }
                      }
                    }
                  }
                });
            }
        }
        function renderCandTable(current) {
            const tbody = document.querySelector('#candTable tbody');
            tbody.innerHTML = '';
            for ( let r = 0; r < dataCand[current - 1].length; r++ ) {
                const tr = document.createElement('tr');
                for ( let c = 0; c < dataCand[current - 1][r].length; c++ ) {
                    const td = document.createElement('td');
                    td.innerHTML = dataCand[current - 1][r][c];
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }
        function renderPagination(current) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            for (let i = 1; i <= 7; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.disabled = i === current;
                btn.style="width:50px;height:50px;font-size:20px";
                btn.onclick = () => {
                    renderTable(i);
                    renderCandTable(i);
                    renderPagination(i);
                };
                pagination.appendChild(btn);
            }
        }

        let dataLenPos = 0;
        let predHtmlPos = 1;
        let validateHtmlPos = 2;
        for ( let current = 1; current <= 7; current ++ ) {
            for ( let r = 0; r < data[current-1].length; r ++ ) {
                pred = data[current - 1][r][predHtmlPos].split('<br>').filter(x => x != '').map(x => Number(x.split(', ')[4].replaceAll("'", '').replaceAll(']', '')));
                validateDiffArr = data[current - 1][r][validateHtmlPos].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => [(Number(x[0][0]) - Number(x[1][0])).toFixed(4), (Number(x[0][1]) - Number(x[1][1])).toFixed(4)]);
                targetPair = data[current - 1][r][validateHtmlPos].split('<br>')[14].replaceAll('[', '').replaceAll(']', '').split(' ').filter(x => x != '' && x != ' ').map(Number);
                predDiffArr = pred.map(x => [(x - targetPair[0]).toFixed(4), (x - targetPair[1]).toFixed(4)])
                data[current - 1][r][predHtmlPos] = data[current - 1][r][predHtmlPos].split('<br>').map((x,idx) => x + '----' + predDiffArr[idx]).join('<br>');
                data[current - 1][r][validateHtmlPos] = data[current - 1][r][validateHtmlPos].split('<br>').map((x,idx) => x + '----' + validateDiffArr[idx]).join('<br>');
                renderOrigin[current - 1].push(data[current - 1][r][validateHtmlPos].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => Number(x[1][0])));
                renderPredLeft[current - 1].push(data[current - 1][r][validateHtmlPos].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => Number(x[0][0])));
                renderPredRight[current - 1].push(data[current - 1][r][validateHtmlPos].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => Number(x[0][1])));
                predCand[current - 1].push(pred);
                let validateDataArr = data[current - 1][r][validateHtmlPos].split('<br>');
                let lastCandValue = Number(validateDataArr[13].split('----')[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')[1]);
                dataCand[current-1].push(pred.map(x => (x - lastCandValue).toFixed(4)));
            }
        }
        // 初始化第一页
        renderTable(1);
        renderCandTable(1);
        renderPagination(1);
    </script>
