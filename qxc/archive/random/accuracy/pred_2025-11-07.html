        function renderCandTable(current) {
            const tbody = document.querySelector('#candTable tbody');
            tbody.innerHTML = '';
            for ( let r of [2,5,8] ) {
                const tr = document.createElement('tr');
                for ( let c = 0; c < dataCand[current - 1][r].length; c++ ) {
                    const td = document.createElement('td');
                    td.innerHTML = dataCand[current - 1][r][c];
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
        }

        function renderTable(current) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            const start = (current - 1) * rows * cols;
            for (let r = 0; r < rows; r++) {
                const tr = document.createElement('tr');
                for (let c = 0; c < cols; c++) {
                    const td = document.createElement('td');
                    td.innerHTML = data[current - 1][c + r * cols];
                    if ( c + r * cols == 2 || c + r * cols == 5 || c + r * cols == 8 ) {
                        td.innerHTML += "<br><div class='canvas_out'><canvas id='canvas_" + (current-1) + "_" + (c + r * cols) + "'></canvas></div>";
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            }
            for ( let v of [2, 5, 8] ) {
                const labels = renderOrigin[current-1][v].map((_, i) => i + 1);
                const ctx = document.getElementById('canvas_' + (current-1) + '_' + v).getContext('2d');

            for ( let pos of [[1,2], [4,5], [7,8]] ) {
                pred = data[current - 1][pos[0]].split('<br>').filter(x => x != '').map(x => Number(x.split(', ')[4].replaceAll("'", '').replaceAll(']', '')));
                validateDiffArr = data[current - 1][pos[1]].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => [(Number(x[0][0]) - Number(x[1][0])).toFixed(4), (Number(x[0][1]) - Number(x[1][1])).toFixed(4)]);
                targetPair = data[current - 1][pos[1]].split('<br>')[14].replaceAll('[', '').replaceAll(']', '').split(' ').filter(x => x != '' && x != ' ').map(Number);
                predDiffArr = pred.map(x => [(x - targetPair[0]).toFixed(4), (x - targetPair[1]).toFixed(4)])
                data[current - 1][pos[0]] = data[current - 1][pos[0]].split('<br>').map((x,idx) => x + '----' + predDiffArr[idx]).join('<br>');
                data[current - 1][pos[1]] = data[current - 1][pos[1]].split('<br>').map((x,idx) => x + '----' + validateDiffArr[idx]).join('<br>');
                renderOrigin[current - 1][pos[1]] = data[current - 1][pos[1]].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => Number(x[1][0]));
                renderPredLeft[current - 1][pos[1]] = data[current - 1][pos[1]].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => Number(x[0][0]));
                renderPredRight[current - 1][pos[1]] = data[current - 1][pos[1]].split('<br>').slice(0,14).map(x => x.split('----')).map(x => [x[0].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != ''), x[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')]).map(x => Number(x[0][1]));
                predCand[current - 1][pos[0]] = pred;
                let validateDataArr = data[current - 1][pos[1]].split('<br>');
                let lastCandValue = Number(validateDataArr[13].split('----')[1].replaceAll('[', '').replaceAll(']', '').split(' ').filter(v => v != '')[1]);
                dataCand[current-1][pos[1]] = pred.map(x => (x - lastCandValue).toFixed(4));
            }
        }
        // 初始化第一页
        renderTable(1);
        renderCandTable(1);
        renderPagination(1);
    </script>
</body>
</html>
